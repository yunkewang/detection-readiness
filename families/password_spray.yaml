id: password_spray
display_name: Password Spray Detection
description: >
  Detects password spray attacks where an adversary attempts a small number of
  commonly used passwords against many accounts to avoid triggering lockout
  thresholds.

required_data_sources:
  - azure_ad_signin

required_fields_by_source:
  azure_ad_signin:
    - user
    - src_ip
    - result

optional_fields_by_source:
  azure_ad_signin:
    - app
    - user_agent
    - location

preferred_query_mode: datamodel
fallback_query_mode: raw

scoring_weights:
  required_data_source: 30.0
  required_fields: 35.0
  optional_fields: 10.0
  preferred_query_mode: 15.0
  fallback_query_mode: 10.0

remediation_guidance:
  azure_ad_signin: >
    Onboard Azure AD sign-in logs via the Splunk Add-on for Microsoft Cloud
    Services. Ensure the azure:aad:signin sourcetype is being collected.
  user: >
    Map the user field from UserPrincipalName or src_user using a field alias
    or calculated field in props.conf.
  src_ip: >
    Ensure the ipAddress field from Azure AD sign-in events is available and
    aliased to src_ip if needed.
  result: >
    Map the authentication result using ResultType, action, or status fields.
    Ensure failed and successful outcomes can be distinguished.
